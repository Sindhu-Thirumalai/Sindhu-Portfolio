<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sindhu | Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Poppins',sans-serif;background:#000;color:#fff}

/* Navbar */
.nav{display:flex;justify-content:center;gap:40px;padding:20px;background:#111;position:fixed;width:100%;z-index:10}
.nav a{color:#aaa;text-decoration:none}
.nav a:hover{color:#fff}

/* Hero Section */
.hero{display:flex;align-items:center;justify-content:space-between;padding:120px 10%}
.left{max-width:500px}
.left h1{font-size:3rem;margin-bottom:10px}
.left p{color:#aaa;margin-bottom:20px}
.btn{background:#22c55e;padding:15px 25px;border-radius:8px;color:#fff;text-decoration:none;display:inline-block}
.btn:hover{background:#16a34a}

.right img{width:300px;height:300px;border-radius:50%;object-fit:cover}

/* Companies */
.companies{padding:50px 10%;text-align:center}
.logos{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;margin-top:20px}
.logo{border:1px solid #222;padding:15px 30px;border-radius:10px;color:#777}

/* Responsive */
@media(max-width:768px){
.hero{flex-direction:column;text-align:center}
.right{margin-top:30px}
}
</style>
</head>
<body>

<div class="nav">
<a href="#">Home</a>
<a href="#">Experience</a>
<a href="#">Projects</a>
<a href="#">Contact</a>
</div>

<section class="hero">
<div class="left">
<h1>Sindhu T</h1>
<p>Cloud & Production Support Engineer with 4+ years of experience in AWS, Linux, SQL and DevOps. I specialize in monitoring, incident management, and building reliable cloud systems.</p>
<a href="#" class="btn">Let's Get Started ></a>
</div>

<div class="right">
<img src="https://via.placeholder.com/300" alt="profile">
</div>
</section>

<section class="companies">
<p>Worked with</p>
<div class="logos">
<div class="logo">AWS</div>
<div class="logo">Linux</div>
<div class="logo">CloudWatch</div>
<div class="logo">Ansible</div>
<div class="logo">MySQL</div>
</div>
</section>

</body>
</html>
